<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indian Visa PDF Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 24px;
        padding: 40px;
        max-width: 820px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }
      .header {
        margin-bottom: 30px;
      }
      .header h1 {
        color: #1a3a5c;
        font-size: 28px;
        font-weight: 700;
      }
      .header .subtitle {
        color: #5a7a94;
        font-size: 15px;
        border-left: 4px solid #2b7bb6;
        padding-left: 16px;
        margin-top: 6px;
      }
      .upload-area {
        border: 2px dashed #c5d8e8;
        border-radius: 16px;
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #f8fafc;
        position: relative;
      }
      .upload-area:hover {
        border-color: #2b7bb6;
        background: #f0f6fb;
      }
      .upload-area input[type="file"] {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        opacity: 0;
        cursor: pointer;
      }
      .upload-icon {
        font-size: 48px;
        margin-bottom: 10px;
      }
      .upload-content p {
        color: #2c5775;
        font-size: 16px;
        font-weight: 500;
      }
      .upload-content .browse-link {
        color: #2b7bb6;
        text-decoration: underline;
      }
      .upload-content small {
        color: #7a9ab5;
        font-size: 13px;
        display: block;
        margin-top: 4px;
      }
      .file-info {
        display: none;
        align-items: center;
        gap: 12px;
        background: #e8f0f8;
        border-radius: 12px;
        padding: 12px 18px;
        margin-top: 12px;
      }
      .file-info #fileName {
        flex: 1;
        font-weight: 500;
        color: #1a3a5c;
        word-break: break-all;
      }
      .file-info #fileSize {
        color: #5a7a94;
        font-size: 13px;
      }
      .remove-btn {
        background: none;
        border: none;
        color: #c0392b;
        font-size: 18px;
        cursor: pointer;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin: 28px 0;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      .form-group label {
        font-size: 12px;
        font-weight: 600;
        color: #2c5775;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 4px;
      }
      .form-group input {
        padding: 10px 14px;
        border: 2px solid #dce4ec;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.2s;
      }
      .form-group input:focus {
        border-color: #2b7bb6;
        outline: none;
        box-shadow: 0 0 0 3px rgba(43, 123, 182, 0.1);
      }
      .form-actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 12px 30px;
        border-radius: 30px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        flex: 1;
        min-width: 140px;
      }
      .btn-secondary {
        background: #e8edf2;
        color: #1a3a5c;
      }
      .btn-secondary:hover {
        background: #d5dde6;
      }
      .btn-primary {
        background: #1a8a4a;
        color: white;
        box-shadow: 0 4px 12px rgba(26, 138, 74, 0.3);
      }
      .btn-primary:hover {
        background: #136f3a;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(26, 138, 74, 0.35);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-icon {
        margin-right: 6px;
      }
      .status {
        margin-top: 20px;
        padding: 14px 20px;
        border-radius: 12px;
        font-weight: 500;
        display: none;
      }
      .status.success {
        display: block;
        background: #e8f5e9;
        color: #1a6a3a;
        border: 1px solid #a5d6a7;
      }
      .status.error {
        display: block;
        background: #fde8e8;
        color: #a93226;
        border: 1px solid #f5c6c6;
      }
      .status.loading {
        display: block;
        background: #e3f0fa;
        color: #1a5f8a;
        border: 1px solid #b8d8f0;
      }
      .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #1a3a5c;
        color: white;
        padding: 14px 24px;
        border-radius: 12px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 1000;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      @media (max-width: 600px) {
        .container {
          padding: 20px;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .btn {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📄 Indian Visa PDF Editor</h1>
        <p class="subtitle">Upload your visa PDF and update personal details</p>
      </div>

      <div class="upload-area" id="uploadArea">
        <input type="file" id="pdfUpload" accept=".pdf" />
        <div class="upload-content">
          <div class="upload-icon">📤</div>
          <p>
            Drag & drop your PDF here or <span class="browse-link">browse</span>
          </p>
          <small>Only PDF files are supported (Max 10MB)</small>
        </div>
      </div>
      <div id="fileInfo" class="file-info">
        <span id="fileName"></span>
        <span id="fileSize"></span>
        <button class="remove-btn" onclick="removeFile()">✕</button>
      </div>

      <form id="visaForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="surname">Surname (As in Passport)</label>
            <input
              type="text"
              id="surname"
              name="surname"
              placeholder="e.g. SAIKOT"
              value="SAIKOT"
              required
            />
          </div>
          <div class="form-group">
            <label for="givenName">Given Name (As in Passport)</label>
            <input
              type="text"
              id="givenName"
              name="givenName"
              placeholder="e.g. ASIF ARMAN"
              value="ASIF ARMAN"
              required
            />
          </div>
          <div class="form-group">
            <label for="nationalId">Citizenship / National ID No</label>
            <input
              type="text"
              id="nationalId"
              name="nationalId"
              placeholder="e.g. 1234567890"
              value="1234567890"
              required
            />
          </div>
          <div class="form-group">
            <label for="passportNo">Passport No.</label>
            <input
              type="text"
              id="passportNo"
              name="passportNo"
              placeholder="e.g. B01234567"
              value="B01234567"
              required
            />
          </div>
          <div class="form-group">
            <label for="phoneNo">Phone No</label>
            <input
              type="tel"
              id="phoneNo"
              name="phoneNo"
              placeholder="e.g. 01712345678"
              value="01712345678"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="e.g. NEW.EMAIL@GMAIL.COM"
              value="NEW.EMAIL@GMAIL.COM"
              required
            />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">
            ↺ Reset
          </button>
          <button type="submit" class="btn btn-primary" id="generateBtn">
            <span class="btn-icon">✎</span> Generate & Download
          </button>
        </div>
      </form>

      <div id="status" class="status"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const uploadArea = document.getElementById("uploadArea");
        const pdfUpload = document.getElementById("pdfUpload");
        const fileInfo = document.getElementById("fileInfo");
        const fileName = document.getElementById("fileName");
        const fileSize = document.getElementById("fileSize");
        const visaForm = document.getElementById("visaForm");
        const generateBtn = document.getElementById("generateBtn");
        const status = document.getElementById("status");
        const toast = document.getElementById("toast");

        let selectedFile = null;

        if (uploadArea) {
          uploadArea.addEventListener("click", function (e) {
            if (e.target.tagName !== "INPUT") pdfUpload.click();
          });
          uploadArea.addEventListener("dragover", function (e) {
            e.preventDefault();
            uploadArea.classList.add("dragover");
          });
          uploadArea.addEventListener("dragleave", function () {
            uploadArea.classList.remove("dragover");
          });
          uploadArea.addEventListener("drop", function (e) {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            if (e.dataTransfer.files.length > 0) {
              handleFile(e.dataTransfer.files[0]);
            }
          });
        }

        if (pdfUpload) {
          pdfUpload.addEventListener("change", function (e) {
            if (e.target.files.length > 0) {
              handleFile(e.target.files[0]);
            }
          });
        }

        function handleFile(file) {
          if (file.type !== "application/pdf") {
            showToast("Please select a PDF file.", "error");
            return;
          }
          if (file.size > 10 * 1024 * 1024) {
            showToast("File size exceeds 10MB limit.", "error");
            return;
          }
          selectedFile = file;
          fileName.textContent = file.name;
          fileSize.textContent = "(" + (file.size / 1024).toFixed(1) + " KB)";
          fileInfo.style.display = "flex";
          uploadArea.querySelector(".upload-content").style.display = "none";
          uploadArea.style.padding = "16px";
          showToast("PDF uploaded successfully!", "success");
        }

        window.removeFile = function () {
          selectedFile = null;
          pdfUpload.value = "";
          fileInfo.style.display = "none";
          uploadArea.querySelector(".upload-content").style.display = "block";
          uploadArea.style.padding = "40px 20px";
        };

        window.resetForm = function () {
          document.getElementById("surname").value = "SAIKOT";
          document.getElementById("givenName").value = "ASIF ARMAN";
          document.getElementById("nationalId").value = "1234567890";
          document.getElementById("passportNo").value = "B01234567";
          document.getElementById("phoneNo").value = "01712345678";
          document.getElementById("email").value = "NEW.EMAIL@GMAIL.COM";
          showToast("Fields reset to defaults", "info");
        };

        if (visaForm) {
          visaForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            if (!selectedFile) {
              showToast("Please upload a PDF file first.", "error");
              return;
            }

            const formData = new FormData();
            formData.append("pdf", selectedFile);
            formData.append(
              "surname",
              document.getElementById("surname").value.trim(),
            );
            formData.append(
              "givenName",
              document.getElementById("givenName").value.trim(),
            );
            formData.append(
              "nationalId",
              document.getElementById("nationalId").value.trim(),
            );
            formData.append(
              "passportNo",
              document.getElementById("passportNo").value.trim(),
            );
            formData.append(
              "phoneNo",
              document.getElementById("phoneNo").value.trim(),
            );
            formData.append(
              "email",
              document.getElementById("email").value.trim(),
            );

            setStatus("Processing... Please wait.", "loading");
            generateBtn.disabled = true;
            generateBtn.innerHTML =
              '<span class="btn-icon">⏳</span> Processing...';

            try {
              const response = await fetch("/generate", {
                method: "POST",
                body: formData,
              });

              const contentType = response.headers.get("Content-Type");

              if (contentType && contentType.includes("application/pdf")) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "visa_edited.pdf";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function () {
                  URL.revokeObjectURL(url);
                }, 5000);

                setStatus("✅ PDF downloaded successfully!", "success");
                showToast("PDF downloaded successfully!", "success");
              } else {
                const text = await response.text();
                try {
                  const json = JSON.parse(text);
                  throw new Error(json.error || "Unknown error");
                } catch {
                  throw new Error("Server returned an invalid response.");
                }
              }
            } catch (error) {
              console.error("Error:", error);
              setStatus("Error: " + error.message, "error");
              showToast("Failed: " + error.message, "error");
            } finally {
              generateBtn.disabled = false;
              generateBtn.innerHTML =
                '<span class="btn-icon">✎</span> Generate & Download';
            }
          });
        }

        function setStatus(message, type) {
          status.textContent = message;
          status.className = "status " + type;
          status.style.display = "block";
        }

        function showToast(message, type) {
          toast.textContent = message;
          toast.className = "toast";
          if (type === "error") toast.style.background = "#c0392b";
          else if (type === "success") toast.style.background = "#1a8a4a";
          else toast.style.background = "#1a3a5c";
          toast.classList.add("show");
          clearTimeout(window.toastTimer);
          window.toastTimer = setTimeout(function () {
            toast.classList.remove("show");
          }, 3000);
        }
      });
    </script>
  </body>
</html>
